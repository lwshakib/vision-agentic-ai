name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Prisma Generate
        run: bun x prisma generate

      - name: Check Formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Run Unit Tests
        run: bun run test

      - name: Build
        run: bun run build
        env:
          # --- Application Configuration ---
          BETTER_AUTH_URL: 'http://localhost:3000'
          NEXT_PUBLIC_BASE_URL: 'http://localhost:3000'

          # --- Authentication ---
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

          # --- Database ---
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

          # --- Cloudinary ---
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}

          # --- AI Workers & Cloudflare ---
          AURA_2_EN_WORKER_URL: ${{ secrets.AURA_2_EN_WORKER_URL }}
          BGE_M3_WORKER_URL: ${{ secrets.BGE_M3_WORKER_URL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          FLUX_2_KLEIN_9B_WORKER_URL: ${{ secrets.FLUX_2_KLEIN_9B_WORKER_URL }}
          FLUX_WORKER_URL: ${{ secrets.FLUX_WORKER_URL }}
          GLM_WORKER_URL: ${{ secrets.GLM_WORKER_URL }}
          WHISPER_LARGE_V3_TURBO_WORKER_URL: ${{ secrets.WHISPER_LARGE_V3_TURBO_WORKER_URL }}

          # --- External APIs ---
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Prisma Generate
        run: bun x prisma generate

      - name: Install Playwright Browsers and Deps
        run: bun x playwright install --with-deps

      - name: Run E2E Tests
        run: bun run test:e2e
        env:
          # --- Application Configuration ---
          BETTER_AUTH_URL: 'http://localhost:3000'
          NEXT_PUBLIC_BASE_URL: 'http://localhost:3000'

          # --- Authentication ---
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

          # --- Database ---
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

          # --- Cloudinary ---
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}

          # --- AI Workers & Cloudflare ---
          AURA_2_EN_WORKER_URL: ${{ secrets.AURA_2_EN_WORKER_URL }}
          BGE_M3_WORKER_URL: ${{ secrets.BGE_M3_WORKER_URL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          FLUX_2_KLEIN_9B_WORKER_URL: ${{ secrets.FLUX_2_KLEIN_9B_WORKER_URL }}
          FLUX_WORKER_URL: ${{ secrets.FLUX_WORKER_URL }}
          GLM_WORKER_URL: ${{ secrets.GLM_WORKER_URL }}
          WHISPER_LARGE_V3_TURBO_WORKER_URL: ${{ secrets.WHISPER_LARGE_V3_TURBO_WORKER_URL }}

          # --- External APIs ---
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
